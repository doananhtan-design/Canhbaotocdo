<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Speedometer Pro</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; --primary: #00ff88; --danger: #ff3e3e; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { text-align: center; background: var(--card); padding: 40px; border-radius: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 80%; border: 1px solid #333; }
        .warning-mode { background: #300 !important; border-color: var(--danger) !important; animation: blink 0.6s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #speed { font-size: 130px; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; }
        .unit { font-size: 20px; color: #777; margin-bottom: 20px; }
        .admin { margin-top: 20px; font-size: 16px; border-top: 1px solid #333; padding-top: 20px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; width: 60px; text-align: center; font-size: 18px; }
        #log { font-size: 12px; color: #ffa500; margin-top: 15px; height: 20px; }
        button { background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 20px; width: 100%; font-weight: bold; font-size: 20px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="unit">TỐC ĐỘ HIỆN TẠI</div>
        <div id="speed">0</div>
        <div class="unit">KM/H</div>

        <div class="admin">
            GIỚI HẠN: <input type="number" id="limit" value="50">
        </div>

        <button id="btn" onclick="initSystem()">KÍCH HOẠT HỆ THỐNG</button>
        <div id="log">Chưa bật GPS</div>
    </div>

    <script>
        let limit = 50;
        let isWarning = false;
        let watchID = null;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function initSystem() {
            limit = parseFloat(document.getElementById('limit').value);
            document.getElementById('btn').style.display = 'none';
            document.getElementById('log').innerText = "Đang tìm vệ tinh...";
            speak("Hệ thống đã bật");

            if ("geolocation" in navigator) {
                // Tùy chọn quan trọng để GPS chạy mượt trên Mobile
                const geoOptions = {
                    enableHighAccuracy: true, // Ép dùng GPS vệ tinh thay vì Wifi/Cell Tower
                    timeout: 5000,            // Chờ tối đa 5s để nhận tín hiệu
                    maximumAge: 0             // Không dùng dữ liệu cũ trong bộ nhớ đệm
                };

                watchID = navigator.geolocation.watchPosition(updateSpeed, handleError, geoOptions);
            } else {
                alert("Thiết bị không hỗ trợ GPS");
            }
        }

        function updateSpeed(pos) {
            // Lấy tốc độ (đơn vị m/s)
            let rawSpeed = pos.coords.speed; 
            
            // Một số dòng Android trả về null nếu tốc độ quá thấp
            let kmh = (rawSpeed && rawSpeed > 0) ? Math.round(rawSpeed * 3.6) : 0;
            
            document.getElementById('speed').innerText = kmh;
            document.getElementById('log').innerText = "Tín hiệu: Tốt";

            if (kmh > limit) {
                if (!isWarning) {
                    document.getElementById('app').classList.add('warning-mode');
                    speak("xin giảm tốc độ");
                    isWarning = true;
                }
            } else {
                document.getElementById('app').classList.remove('warning-mode');
                isWarning = false;
            }
        }

        function handleError(err) {
            let errorMsg = "";
            switch(err.code) {
                case 1: errorMsg = "Lỗi: Bạn chưa Cho Phép quyền Vị trí."; break;
                case 2: errorMsg = "Lỗi: Không bắt được sóng GPS (Hãy ra ngoài trời)."; break;
                case 3: errorMsg = "Lỗi: Mất quá nhiều thời gian để lấy vị trí."; break;
                default: errorMsg = "Lỗi không xác định."; break;
            }
            document.getElementById('log').innerText = errorMsg;
        }
    </script>
</body>
</html>
