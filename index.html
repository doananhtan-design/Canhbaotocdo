<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cảnh Báo Tốc Độ Liên Tục</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; background: var(--card); padding: 30px; border-radius: 28px; width: 85%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .warning-active { background: #450a0a !important; border-color: var(--danger) !important; animation: pulse-red 0.5s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #speed { font-size: 110px; font-weight: 900; color: var(--primary); margin: 5px 0; line-height: 1; }
        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .admin-panel { margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 8px; width: 60px; text-align: center; font-size: 18px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 16px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: var(--danger); color: white; display: none; }
        #fixGpsBtn { background: var(--warning); color: #000; display: none; }
        #status { margin-top: 15px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="label">Tốc độ hiện tại</div>
        <div id="speed">0</div>
        <div class="label">km/h</div>

        <div class="admin-panel">
            Giới hạn Admin: <input type="number" id="limitInput" value="50">
        </div>

        <div class="btn-group">
            <button id="startBtn" onclick="initApp()">BẮT ĐẦU GIÁM SÁT</button>
            <button id="fixGpsBtn" onclick="reconnectGPS()">BẬT QUYỀN ĐỊNH VỊ NGAY</button>
            <button id="stopBtn" onclick="stopApp()">KẾT THÚC</button>
        </div>

        <div id="status">Sẵn sàng</div>
    </div>

    <script>
        let watchID = null;
        let gpsTimer = null;
        let warningInterval = null; // Vòng lặp cảnh báo âm thanh
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Hàm tạo tiếng "Ping Ping" bằng code (không cần file mp3)
        function playPingPing() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Âm cao
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
            
            // Tiếng ping thứ 2 sau 150ms
            setTimeout(() => {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.2);
            }, 150);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';
            msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function startWarningLoop() {
            if (warningInterval) return;
            // Phát lần đầu ngay lập tức
            playPingPing();
            setTimeout(() => speak("xin giảm tốc độ"), 500);

            // Thiết lập vòng lặp 2 giây
            warningInterval = setInterval(() => {
                playPingPing();
                setTimeout(() => speak("xin giảm tốc độ"), 500);
            }, 2000);
        }

        function stopWarningLoop() {
            clearInterval(warningInterval);
            warningInterval = null;
            window.speechSynthesis.cancel();
        }

        function initApp() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            
            speak("Hệ thống bắt đầu");

            gpsTimer = setTimeout(() => {
                if (document.getElementById('speed').innerText === "0") {
                    document.getElementById('fixGpsBtn').style.display = 'block';
                    speak("Vui lòng bật quyền định vị");
                }
            }, 10000);

            reconnectGPS();
        }

        function reconnectGPS() {
            if (watchID) navigator.geolocation.clearWatch(watchID);
            watchID = navigator.geolocation.watchPosition((pos) => {
                clearTimeout(gpsTimer);
                document.getElementById('fixGpsBtn').style.display = 'none';
                
                const kmh = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                document.getElementById('speed').innerText = kmh;
                
                const limit = parseFloat(document.getElementById('limitInput').value);
                const mainBox = document.getElementById('mainBox');

                if (kmh > limit) {
                    mainBox.classList.add('warning-active');
                    document.getElementById('speed').style.color = '#ff4444';
                    startWarningLoop();
                } else {
                    mainBox.classList.remove('warning-active');
                    document.getElementById('speed').style.color = '#10b981';
                    stopWarningLoop();
                }
            }, (err) => {
                document.getElementById('status').innerText = "Lỗi: " + err.message;
            }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        function stopApp() {
            if (watchID) navigator.geolocation.clearWatch(watchID);
            stopWarningLoop();
            location.reload(); // Tải lại trang để reset sạch sẽ
        }
    </script>
</body>
</html>
