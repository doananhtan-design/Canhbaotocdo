<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Cảnh Báo Tốc Độ</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --primary: #10b981; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .container { 
            text-align: center; 
            background: var(--card); 
            padding: 30px; 
            border-radius: 28px; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        /* Hiệu ứng nháy đỏ khi quá tốc độ */
        .warning-active { 
            background: #450a0a !important; 
            border-color: var(--danger) !important; 
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        #speed { 
            font-size: 110px; 
            font-weight: 900; 
            color: var(--primary); 
            margin: 5px 0;
            line-height: 1;
        }

        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }

        .admin-panel { 
            margin: 20px 0; 
            padding: 15px; 
            background: rgba(15, 23, 42, 0.5); 
            border-radius: 15px;
            font-size: 16px;
        }

        input { 
            background: #0f172a; 
            border: 1px solid #334155; 
            color: white; 
            padding: 8px; 
            border-radius: 8px; 
            width: 60px; 
            text-align: center; 
            font-size: 18px;
            font-weight: bold;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button { 
            padding: 16px; 
            border: none; 
            border-radius: 16px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: var(--danger); color: white; display: none; }
        
        /* Nút bật quyền định vị thông minh */
        #fixGpsBtn { 
            background: var(--warning); 
            color: #000; 
            display: none; 
            animation: pulse-warn 1s infinite;
        }

        @keyframes pulse-warn {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        #status { margin-top: 15px; font-size: 12px; min-height: 18px; color: #64748b; }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="label">Tốc độ hiện tại</div>
        <div id="speed">0</div>
        <div class="label">km/h</div>

        <div class="admin-panel">
            Giới hạn Admin: <input type="number" id="limitInput" value="50">
        </div>

        <div class="btn-group">
            <button id="startBtn" onclick="initApp()">BẮT ĐẦU GIÁM SÁT</button>
            <button id="fixGpsBtn" onclick="reconnectGPS()">BẬT QUYỀN ĐỊNH VỊ NGAY</button>
            <button id="stopBtn" onclick="stopApp()">KẾT THÚC</button>
        </div>

        <div id="status">Chưa kích hoạt GPS</div>
    </div>

    <script>
        let watchID = null;
        let isWarning = false;
        let gpsTimer = null;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';
            msg.rate = 1.1; // Tốc độ nói hơi nhanh để cảnh báo kịp thời
            window.speechSynthesis.speak(msg);
        }

        function initApp() {
            // Thay đổi giao diện nút
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('status').innerText = "Đang tìm tín hiệu GPS...";
            
            speak("Bắt đầu giám sát");

            // Sau 10 giây nếu tốc độ vẫn bằng 0, hiện nút Fix GPS
            gpsTimer = setTimeout(() => {
                if (document.getElementById('speed').innerText === "0") {
                    document.getElementById('fixGpsBtn').style.display = 'block';
                    document.getElementById('status').innerText = "Vui lòng cho phép quyền vị trí!";
                    document.getElementById('status').style.color = "#f59e0b";
                    speak("Vui lòng bật quyền định vị");
                }
            }, 10000);

            reconnectGPS();
        }

        function reconnectGPS() {
            if (watchID) navigator.geolocation.clearWatch(watchID);

            const options = {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
            };

            watchID = navigator.geolocation.watchPosition((pos) => {
                // Nếu nhận được dữ liệu thành công
                clearTimeout(gpsTimer);
                document.getElementById('fixGpsBtn').style.display = 'none';
                document.getElementById('status').innerText = "Tín hiệu: Ổn định";
                document.getElementById('status').style.color = "#10b981";

                const rawSpeed = pos.coords.speed; // đơn vị m/s
                const kmh = (rawSpeed && rawSpeed > 0) ? Math.round(rawSpeed * 3.6) : 0;
                
                document.getElementById('speed').innerText = kmh;
                checkSpeed(kmh);
            }, (err) => {
                document.getElementById('status').innerText = "Lỗi GPS: " + err.message;
                document.getElementById('status').style.color = "#ef4444";
            }, options);
        }

        function checkSpeed(kmh) {
            const limit = parseFloat(document.getElementById('limitInput').value);
            const mainBox = document.getElementById('mainBox');
            const speedText = document.getElementById('speed');

            if (kmh > limit) {
                if (!isWarning) {
                    mainBox.classList.add('warning-active');
                    speedText.style.color = "#ff4444";
                    speak("xin giảm tốc độ");
                    isWarning = true;
                }
            } else {
                mainBox.classList.remove('warning-active');
                speedText.style.color = "#10b981";
                isWarning = false;
            }
        }

        function stopApp() {
            if (watchID) {
                navigator.geolocation.clearWatch(watchID);
                watchID = null;
            }
            clearTimeout(gpsTimer);
            
            speak("Đã tắt hệ thống");
            
            // Reset giao diện
            document.getElementById('speed').innerText = "0";
            document.getElementById('speed').style.color = "#10b981";
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('fixGpsBtn').style.display = 'none';
            document.getElementById('mainBox').classList.remove('warning-active');
            document.getElementById('status').innerText = "Hệ thống đã dừng.";
            document.getElementById('status').style.color = "#64748b";
        }
    </script>
</body>
</html>
